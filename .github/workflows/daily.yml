name: Récap sportif quotidien

# Génère le récapitulatif chaque nuit, AVANT 9h (Paris), puis le publie.
on:
  schedule:
    # GitHub retarde/saute souvent les tâches planifiées : on prévoit plusieurs
    # créneaux le matin (heures UTC) pour qu'au moins un passe avant 9h Paris.
    # 04:30 UTC ≈ 06:30 Paris · 05:30 ≈ 07:30 · 06:30 ≈ 08:30 (heure d'été).
    - cron: "30 4 * * *"
    - cron: "30 5 * * *"
    - cron: "30 6 * * *"
  workflow_dispatch: {} # permet aussi de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm install

      - name: Générer le récap
        run: npm run build

      - name: Publier les nouvelles données
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Récap du $(date -u +%Y-%m-%d)"
            git push
          fi
