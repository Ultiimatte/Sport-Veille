name: Récap sportif quotidien

# Génère le récapitulatif chaque nuit, AVANT 9h (Paris), puis le publie.
on:
  schedule:
    # Filet de secours (le déclencheur principal est cron-job.org à 6h30 Paris).
    # Heures UTC, placées avant 7h Paris. Été (UTC+2) : 05:30 / 06:00 / 06:30 Paris.
    - cron: "30 3 * * *"
    - cron: "0 4 * * *"
    - cron: "30 4 * * *"
  workflow_dispatch: # lancement manuel depuis GitHub
    inputs:
      message:
        description: "Texte de notification de TEST (laisser vide = envoi normal)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25 # garde-fou : ne jamais rester bloque des heures
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm install

      - name: Générer le récap
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Notification du matin (push)
        env:
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          TEST_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          pip install --quiet pywebpush
          python3 scripts/send-push.py

      - name: Publier les nouvelles données
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Récap du $(date -u +%Y-%m-%d)"
            git push
          fi
