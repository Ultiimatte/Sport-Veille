name: Récap sportif quotidien

# Génère le récapitulatif chaque nuit, AVANT 9h (Paris), puis le publie.
on:
  # Déclenchement matinal assuré par cron-job.org (7h30 Paris) via l'API
  # workflow_dispatch. Les crons internes de GitHub ont été retirés car peu
  # fiables (déclenchements très en retard). Lancement manuel toujours possible.
  workflow_dispatch: # lancement manuel depuis GitHub
    inputs:
      message:
        description: "Texte de notification de TEST (laisser vide = envoi normal)"
        required: false
        default: ""

permissions:
  contents: write

# Un seul run à la fois : si plusieurs se déclenchent (ex : crons GitHub en
# retard qui se cumulent), ils s'exécutent l'un après l'autre au lieu de se
# chevaucher → évite les collisions de "git push".
concurrency:
  group: sportveille-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # garde-fou : ne jamais rester bloque des heures
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm install

      - name: Générer le récap
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      # On PUBLIE le récap AVANT de notifier : ainsi l'édition du jour est garantie
      # même si l'étape de notification venait à bloquer ou échouer.
      - name: Publier le récap (données)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Récap du $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notification du matin (push via OneSignal)
        timeout-minutes: 8 # la notif ne peut jamais bloquer le job longtemps
        env:
          ONESIGNAL_APP_ID: "62991026-15c3-4c0b-87e6-9761f09f8cfc"
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          TEST_MESSAGE: ${{ github.event.inputs.message }}
        run: python3 scripts/send-push.py

      # Sauvegarde le marqueur anti-doublon écrit par la notif (même si elle a échoué).
      - name: Publier le marqueur de notification
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Rien à committer."
          else
            git commit -m "Marqueur notif du $(date -u +%Y-%m-%d)"
            git push || echo "Push du marqueur ignoré."
          fi
