<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>SportVeille</title>
  <meta name="description" content="Votre récap quotidien de l'actualité sportive." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#f9f9f7" />

  <!-- iOS : ajout a l'ecran d'accueil -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SportVeille" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" href="icon-512.png" sizes="512x512" type="image/png" />

  <!-- Police serif du logo (avec repli Georgia si hors-ligne) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header" id="appHeader">
    <div class="topbar">
      <div class="logo"><b>Sport</b><span>Veille</span></div>
      <div class="actions">
        <span class="date-wrap">
          <span class="date-pill" id="datePill">—</span>
          <input type="date" id="datePicker" class="date-overlay" aria-label="Choisir une date" />
        </span>
        <button class="circle-btn" id="refreshBtn" title="Rafraîchir" aria-label="Rafraîchir">↻</button>
        <button class="circle-btn" id="searchBtn" title="Rechercher" aria-label="Rechercher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="15.8" y1="15.8" x2="21" y2="21"/></svg>
        </button>
      </div>
    </div>
    <div id="filters" class="filters" role="tablist"></div>
  </header>

  <main id="content" class="content">
    <div class="loader">Chargement des actualités…</div>
  </main>

  <!-- Recherche façon Spotlight (voile gris + boîte + résultats) -->
  <div id="searchOverlay" class="search-overlay" hidden>
    <div class="search-box">
      <span class="search-box__icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="15.8" y1="15.8" x2="21" y2="21"/></svg>
      </span>
      <input id="searchInput" type="text" placeholder="Rechercher un article…" autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <nav class="tabbar" role="tablist">
    <button class="tabbar__btn is-active" data-view="today">📰<span>Aujourd'hui</span></button>
    <button class="tabbar__btn" data-view="history">🗓️<span>Historique</span></button>
    <button class="tabbar__btn" data-view="settings">⚙️<span>Réglages</span></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
